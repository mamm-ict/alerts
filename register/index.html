<!DOCTYPE html>
<html lang="en">

<head>
    <title>MAMM Alert Registration Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../localforage.min.js"></script>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-analytics.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyArrnKp3JfRV9HfdkGsfwIbu57YvsRStew",
            authDomain: "mamm-alerts.firebaseapp.com",
            projectId: "mamm-alerts",
            storageBucket: "mamm-alerts.firebasestorage.app",
            messagingSenderId: "812376016079",
            appId: "1:812376016079:web:62e9c74cba6c13ac47a3ba",
            measurementId: "G-FZH66DH45K"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let credentialId = null;

        let subToTopic = async (server, topic) => {
            let token = document.querySelector("#token-input").value;

            if (!token || token.length < 128) {
                alert("Please enter a valid notification token.");
                return;
            }

            console.log(server + "/subscribe");
            console.log(JSON.stringify({
                "token": token,
                "topic": topic,
                "deviceID": credentialId
            }));

            let res = await fetch(server + "/subscribe", {
                "method": "POST",
                "body": JSON.stringify({
                    "token": token,
                    "topic": topic,
                }),
                "mode": "cors"
            });

            if (res.status == 200) {
                await addSubscription(token, topic);
                alert("Subscribed to " + topic);
            } else {
                alert("Failed to subscribe");
            }

            return res.status == 200;
        }

        let getSubList = async () => {
            let res = await fetch("config.json");
            let json = {};

            if (res.ok) {
                json = await res.json();
            }

            return json;
        }

        // ---------- DEBUG HELPERS ----------
        function debugLog(...args) {
            // use console.debug so it's easy to filter
            console.debug("[DBG]", ...args);
        }

        // ---------- robust getTokenList with debug ----------
        let getTokenList = async () => {
            try {
                debugLog("getTokenList() start");

                // sanity checks
                debugLog("window.localforage exists:", !!window.localforage);
                debugLog("db exists:", !!db);

                // get device id from localforage
                credentialId = await localforage.getItem("deviceId");
                debugLog("credentialId from localforage:", credentialId);

                if (!credentialId) {
                    debugLog("No deviceId in localforage -> returning empty list");
                    return [];
                }

                // fetch tokens collection
                const colRef = collection(db, "tokens");
                debugLog("Querying collection:", colRef);
                const res = await getDocs(colRef);

                debugLog("getDocs returned, docCount =", res.size ?? "unknown");

                const convertCreated = (val) => {
                    if (!val) return 0;
                    if (typeof val === "number") return val;
                    if (val?.toMillis) return val.toMillis();
                    const p = Date.parse(val);
                    if (!isNaN(p)) return p;
                    return 0;
                };

                let tokens = [];

                res.forEach((docSnap) => {
                    const id = docSnap.id;
                    const data = docSnap.data();
                    debugLog("doc:", id, data);

                    // ONLY show tokens for this device
                    if (data.deviceId !== credentialId) {
                        debugLog("skip (deviceId mismatch):", id, "doc.deviceId=", data.deviceId);
                        return;
                    }

                    tokens.push({
                        id,
                        created: convertCreated(data.created),
                        deviceId: data.deviceId
                    });
                });

                tokens.sort((a, b) => b.created - a.created);

                debugLog("getTokenList() returning tokens:", tokens);
                return tokens;
            } catch (err) {
                console.error("[ERR] getTokenList error:", err);
                return [];
            }
        };

        // ---------- robust setup with debug ----------
        let setup = async () => {
            try {
                debugLog("setup() start");

                // check localforage lib
                debugLog("localforage type:", typeof localforage);
                if (!window.localforage) {
                    console.error("[ERR] localforage NOT loaded (window.localforage falsy)");
                }

                // check firebase firestore objects
                debugLog("firebase db object:", db ? "ok" : "missing");

                // check DOM elements exist
                debugLog("DOM tokens element:", !!document.querySelector("#tokens"));
                debugLog("DOM selector button:", !!document.querySelector("#selector"));

                // ensure deviceId exists (if not, generate and store for quick test)
                let localDeviceId = await localforage.getItem("deviceId");
                debugLog("initial localDeviceId:", localDeviceId);

                if (!localDeviceId) {
                    // TEMP: create a predictable test id for debugging (remove later if you want real flow)
                    localDeviceId = "nb1-debug-" + Math.random().toString(36).slice(2, 8);
                    await localforage.setItem("deviceId", localDeviceId);
                    debugLog("generated+stored test deviceId:", localDeviceId);
                }

                // load UI data
                const data = await getSubList();
                debugLog("config.json data:", data);

                const tokens = await getTokenList();
                debugLog("tokens fetched in setup:", tokens);

                // render subscribe buttons
                let list = document.querySelector("#subscribe-list");
                if (list) list.style.display = "flex";

                if (data && Array.isArray(data.subscriptions)) {
                    const server = data.server;
                    data.subscriptions.forEach((topic) => {
                        let div = document.createElement("div");
                        let btn = document.createElement("button");
                        btn.classList.add("btn", "p-3", "btn-primary", "w-100");
                        div.classList.add("col-md-4", "col-12", "p-1");
                        btn.innerText = topic;
                        btn.addEventListener("click", async () => {
                            let token = document.querySelector("#token-input").value;
                            if (!token) {
                                alert("Select a token first!");
                                return;
                            }

                            let subs = await getSubscriptions(token);

                            // Already subscribed? Disable.
                            if (subs.includes(topic)) {
                                alert("Already subscribed.");
                                return;
                            }

                            let res = await subToTopic(server, topic);
                            if (res) {
                                // visually mark
                                btn.classList.remove("btn-primary");
                                btn.classList.add("btn-success");
                                btn.innerHTML = topic + " &#10003;";
                                btn.disabled = true;
                            }
                        });
                        div.appendChild(btn);
                        list.appendChild(div);
                    });
                } else {
                    debugLog("No subscriptions array in config.json or config.json not loaded");
                }

                // render tokens dropdown
                if (!tokens || tokens.length === 0) {
                    debugLog("No tokens to render");
                    // make sure selector is disabled
                    document.querySelector("#selector")?.setAttribute("disabled", "disabled");
                    return;
                }

                let tokenList = document.querySelector("#tokens");
                tokenList.innerHTML = "";
                document.querySelector("#selector")?.removeAttribute("disabled");

                const latestCreated = tokens[0]?.created ?? 0;

                tokens.forEach(t => {
                    let li = document.createElement("li");
                    let a = document.createElement("button");

                    a.classList.add("dropdown-item", "text-truncate");

                    const isNew = t.created === latestCreated;
                    const short = shortenToken(t.id);

                    if (isNew) {
                        a.innerHTML = `<span style="
                    color:#ff3b3b;
                    font-weight:bold;
                    text-shadow:0 0 6px rgba(255,50,50,.8);
                ">[NEW]</span> ${short}`;
                    } else {
                        a.innerHTML = short;
                    }

                    a.title = t.id;
                    li.appendChild(a);
                    li.classList.add("px-2", "w-100");
                    li.addEventListener("click", () => { tokenSelect(t.id); });
                    tokenList.appendChild(li);
                });

                debugLog("setup() finished rendering");
            } catch (err) {
                console.error("[ERR] setup error:", err);
            }
        };


        function shortenToken(t) {
            if (!t) return "";
            if (t.length <= 25) return t; // kalau token sangat pendek

            const start = t.substring(0, 10);       // ambil 10 depan
            const end = t.substring(t.length - 6);  // ambil 6 belakang
            return `${start}...${end}`;
        }
        window.tokenSelect = async function (id) {
            document.querySelector("#token-input").value = id;

            let subs = await getSubscriptions(id); // <-- pull from Firestore

            document.querySelectorAll("#subscribe-list button").forEach(btn => {
                let topic = btn.innerHTML.replace(" &#10003;", "");

                if (subs.includes(topic)) {
                    btn.classList.remove("btn-primary");
                    btn.classList.add("btn-success");
                    btn.innerHTML = topic + " &#10003;";
                    btn.disabled = true;
                } else {
                    btn.classList.add("btn-primary");
                    btn.classList.remove("btn-success");
                    btn.innerHTML = topic;
                    btn.disabled = false;
                }
            });
        };


        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

        async function getSubscriptions(token) {
            const ref = doc(db, "subscriptions", token);
            const snap = await getDoc(ref);

            if (!snap.exists()) return [];

            const topics = snap.data().topics || [];

            // keep local copy updated
            await localforage.setItem("SubscribedMachines", topics);

            return topics;
        }


        async function addSubscription(token, topic) {
            const ref = doc(db, "subscriptions", token);
            const snap = await getDoc(ref);

            let arr = [];
            if (snap.exists()) {
                arr = snap.data().topics || [];
            }

            // avoid duplicates
            if (!arr.includes(topic)) arr.push(topic);

            await setDoc(ref, { topics: arr }, { merge: true });
            // -----------------------------------------
            // NEW: sync to localforage for offline use
            // -----------------------------------------
            let localSubs = await localforage.getItem("SubscribedMachines") || [];

            if (!localSubs.includes(topic)) {
                localSubs.push(topic);
                await localforage.setItem("SubscribedMachines", localSubs);
            }
        }


        setup();
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
        }

        #sub-list {
            margin-top: 20px;
        }

        #tokens {
            max-height: 200px;
            /* cukup untuk 5 item */
            overflow-y: auto;
            /* enable scroll */
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">MAMM ALERT SUBSCRIPTION MANAGER</h1>

        <div class="input-group mb-3 d-flex flex-column justify-content-between gap-2">
            <div class="dropdown">
                <button id="selector" class="btn btn-secondary dropdown-toggle w-100" type="button"
                    data-bs-toggle="dropdown" aria-expanded="false" disabled>
                    Select Token
                </button>
                <ul class="dropdown-menu w-100" id="tokens">
                    <!-- TOKEN LIST GOES HERE -->

                </ul>
            </div>
            <div class="d-flex justify-content-between gap-1">
                <input type="text" id="token-input" class="form-control w-100 rounded"
                    placeholder="Enter Notification Token" aria-label="Enter Notification Token">
                <button class="btn btn-danger flex-shrink-1" id="clear-button">CLEAR</button>
            </div>
        </div>

        <div id="subscribe-list" class="d-flex flex-wrap"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        document.querySelector("#clear-button").addEventListener("click", () => {
            document.querySelector("#token-input").value = "";
        });
    </script>
</body>

</html>
